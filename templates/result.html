<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your RoleFit analysis results with AI-generated insights and personalized cover letter.">
    <title>Your RoleFit Results</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>RoleFit</h1>
            </div>
        </div>
    </header>
    <section class="results-container">
        <div class="container">
            <div class="results-header">
                <h1>Your Match Analysis</h1>
                <p>Here's what we found about your fit for this role</p>
            </div>
            <div class="score-card">
                <div class="score-circle">
                    <svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" class="score-bg"></circle>
                        <circle cx="50" cy="50" r="45" class="score-fill" style="stroke-dashoffset: calc(283 - 283 * {{ score }} / 100);"></circle>
                    </svg>
                    <div class="score-text">{{ score }}%</div>
                </div>
                <div class="score-label">Match Score</div>
            </div>
            <div class="results-grid">
                <div class="result-card">
                    <h2>Analysis</h2>
                    <div class="result-content">
                        <pre class="formatted-text">{{ explanation }}</pre>
                    </div>
                </div>
                <div class="result-card">
                    <h2>Your Personalized Cover Letter</h2>
                    <div class="result-content">
                        <pre class="formatted-text">{{ cover_letter }}</pre>
                    </div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="button-primary" onclick="window.print()">Print Results</button>
                <button class="button-secondary" onclick="window.location.href='/'">Try Another</button>
            </div>
        </div>
    </section>
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 RoleFit. Empowering careers with AI.</p>
        </div>
    </footer>
</body>
</html>
